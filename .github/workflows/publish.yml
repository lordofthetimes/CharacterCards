name: Publish Release
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from gradle.properties
        run: echo "VERSION=$(grep 'version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Build with Gradle
        run: ./gradlew shadowJar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          body_path: CHANGELOG.md
          files: build/libs/CharacterCard-${{ env.VERSION }}.jar
      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: build/libs/CharacterCard-${{ env.VERSION }}.jar

  modrinth:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from gradle.properties
        run: echo "VERSION=$(grep 'version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-jar
          path: build/libs/

      - name: Publish to Modrinth
        run: |
          VERSION="${{ env.VERSION }}"
          CHANGELOG=$(cat CHANGELOG.md)

          DATA=$(jq -n \
            --arg version "$VERSION" \
            --arg changelog "## Character Cards ${VERSION}
  
            ${CHANGELOG}

            **To update the plugin, just delete the old version and drag the new one into the plugins folder. I recommend to first boot up test server and see config changes**
            If you find any issues or want to suggest features, please open an issue on my github repo [--> here <--](https://github.com/lordofthetimes/CharacterCards/issues)" \
            '{
          "name": $version,
          "version_number": $version,
          "changelog": $changelog,
          "game_versions": ["1.21.x", "26.1.x"],
          "version_type": "release",
          "loaders": ["paper", "purpur"],
          "featured": true,
          "project_id": "bmeFJq7B",
          "file_parts": ["jar"]
          }')

          curl -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${{ secrets.MODRINTH_SECRET }}" \
            -F "data=$DATA" \
            -F "jar=@build/libs/CharacterCard-${VERSION}.jar"

  discord:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from gradle.properties
        run: echo "VERSION=$(grep 'version=' gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Notify Discord
        run: |
          CHANGELOG=$(cat CHANGELOG.md)
          VERSION="${{ env.VERSION }}"
          jq -n --arg content "## Character Cards ${VERSION}
        
          ${CHANGELOG}
          
          **You can download this version [here](https://modrinth.com/plugin/character-cards/version/${VERSION})!**" \
          '{"content": $content, "flags": 4}' | \
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d @-