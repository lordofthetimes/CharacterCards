name: Test Discord
on:
  workflow_dispatch:
    inputs:
      changelog:
        description: 'Changelog'
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        run: |
          CHANGELOG="${{ github.event.inputs.changelog }}"
          CONTENT="$(printf '## Character Cards TEST\n\n%s\n\n**You can download this version [here](https://modrinth.com/plugin/character-cards/version/TEST)!**' "$CHANGELOG")"
          jq -n --arg content "$CONTENT" '{"content": $content, "flags": 4}' | \
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d @-
