name: Notify Discord
on:
  release:
    types: [published]

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify Discord
        run: |
          CHANGELOG=$(cat CHANGELOG.md)
          VERSION="${{ github.event.release.tag_name }}"
          jq -n --arg content "## Character Cards ${VERSION}
          
          ${{CHANGELOG}}

          **You can download this version [here](https://modrinth.com/plugin/character-cards/version/${VERSION})!**" \
                    '{"content": $content, "flags": 4}' | \
                    curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
                      -H "Content-Type: application/json" \
                      -d @-
